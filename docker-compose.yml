services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/app
      REDIS_URL: redis://redis:6379
      SECRET_KEY: local-dev-secret
      CORS_ORIGINS: http://localhost:3000
      APP_ENV: development
      APP_NAME: starter-api
      LOG_LEVEL: info
    depends_on:
      - db
      - redis

  worker:
    build: ./worker
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/app
      REDIS_URL: redis://redis:6379
      APP_ENV: development
      LOG_LEVEL: info
    depends_on:
      - db
      - redis

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
